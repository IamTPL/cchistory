<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CcHistory</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="index-page">
  <div id="app" class="app-shell">
    <aside class="side-panel" aria-label="Conversation navigation">
      <header class="side-header">
        <div class="side-title">
          <h1>CcHistory</h1>
        </div>
        <label class="search-box">
          <span>Search</span>
          <input id="query" type="search" placeholder="Prompt, Claude reply, path, tool call, project" autocomplete="off">
          <kbd>Ctrl K</kbd>
        </label>
      </header>

      <section class="metric-grid" aria-label="Export summary">
        <div class="metric"><strong id="conversation-count">0</strong><span>Conversations</span></div>
        <div class="metric"><strong id="project-count">0</strong><span>Projects</span></div>
        <div class="metric"><strong id="subagent-count">0</strong><span>Sub-agent runs</span></div>
        <div class="metric"><strong id="token-count">0</strong><span>Tokens indexed</span></div>
      </section>

      <section class="list-panel">
        <div class="tabs" role="tablist" aria-label="Browse mode">
          <button class="tab" type="button" data-mode="projects" role="tab">Projects</button>
          <button class="tab" type="button" data-mode="recent" role="tab">Recent</button>
        </div>
        <p class="tab-help" id="tab-help"></p>
        <div id="list" class="list-body" aria-live="polite"></div>
      </section>
    </aside>

    <main class="viewer" id="viewer">
      <div class="viewer-bar">
        <div class="viewer-title">
          <strong id="viewer-title">Conversation</strong>
          <span id="viewer-meta">Select a conversation</span>
        </div>
        <div class="toolbar">
          <a class="button" id="viewer-md" href="#" download data-download>Download MD</a>
          <a class="button" id="viewer-json" href="#" download data-download>Download JSON</a>
        </div>
      </div>
      <iframe id="frame" name="view" title="Conversation viewer"></iframe>
      <div class="viewer-status" id="viewer-status">
        <div class="viewer-status-mark" aria-hidden="true">CH</div>
        <p class="viewer-status-title" id="viewer-status-title">Loading conversation</p>
        <p class="viewer-status-copy" id="viewer-status-copy">Preparing the reader.</p>
      </div>
    </main>
  </div>

  <script>
    const DATA = __DATA__;
    const MAX_ROWS = 400;
    const STORE_MODE = "claude-history-mode";
    const STORE_PROJECTS = "claude-history-collapsed-projects";

    const list = document.getElementById("list");
    const query = document.getElementById("query");
    const tabHelp = document.getElementById("tab-help");
    const frame = document.getElementById("frame");
    const viewer = document.getElementById("viewer");
    const viewerTitle = document.getElementById("viewer-title");
    const viewerMeta = document.getElementById("viewer-meta");
    const viewerStatusTitle = document.getElementById("viewer-status-title");
    const viewerStatusCopy = document.getElementById("viewer-status-copy");
    const viewerMd = document.getElementById("viewer-md");
    const viewerJson = document.getElementById("viewer-json");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));

    const numberFormat = new Intl.NumberFormat();
    const compactFormat = new Intl.NumberFormat(undefined, { notation: "compact", maximumFractionDigits: 1 });
    const dateFormat = new Intl.DateTimeFormat(undefined, { month: "2-digit", day: "2-digit", year: "2-digit" });
    const timeFormat = new Intl.DateTimeFormat(undefined, { hour: "2-digit", minute: "2-digit", hour12: false });

    const ITEMS = DATA
      .map((item) => ({ ...item, _sort: sortValue(item), _search: searchText(item) }))
      .sort((a, b) => b._sort - a._sort);
    const BY_FILE = new Map(ITEMS.map((item) => [item.f, item]));
    const PROJECTS = new Set(ITEMS.map((item) => item.p));

    let mode = readStore(STORE_MODE, "recent");
    if (!["projects", "recent"].includes(mode)) mode = "recent";
    let activeFile = "";
    let collapsedProjects = readSet(STORE_PROJECTS);
    let renderTimer = 0;

    function readStore(key, fallback) {
      try {
        return localStorage.getItem(key) || fallback;
      } catch {
        return fallback;
      }
    }

    function writeStore(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch {
        return undefined;
      }
    }

    function readSet(key) {
      try {
        return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
      } catch {
        return new Set();
      }
    }

    function writeSet(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(Array.from(value)));
      } catch {
        return undefined;
      }
    }

    function sortValue(item) {
      if (typeof item.s === "number") return item.s;
      const parsed = Date.parse(item.last || item.created || item.dt || "");
      return Number.isNaN(parsed) ? 0 : parsed;
    }

    function searchText(item) {
      return [
        item.q,
        item.t,
        item.p,
        item.preview,
        item.cwd,
        item.branch,
        item.session,
        ...(item.models || []),
        ...Object.keys(item.tool_counts || {}),
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function formatDateTime(value) {
      const parsed = new Date(value || "");
      if (!value || Number.isNaN(parsed.valueOf())) return "";
      return `${dateFormat.format(parsed)} ${timeFormat.format(parsed)}`;
    }

    function itemDetail(item) {
      const when = formatDateTime(item.last || item.dt);
      const type = item.sa ? "sub-agent" : "conversation";
      return `${when} / ${numberFormat.format(item.n || 0)} turns / ${type}`;
    }

    function fileName(path) {
      return (path || "").split("/").pop() || "";
    }

    function setDownloadLink(link, href) {
      link.href = href || "#";
      if (href) {
        link.download = fileName(href);
        link.dataset.downloadName = fileName(href);
        link.removeAttribute("aria-disabled");
      } else {
        link.removeAttribute("download");
        delete link.dataset.downloadName;
        link.setAttribute("aria-disabled", "true");
      }
    }

    function updateSummary() {
      const subagents = ITEMS.filter((item) => item.sa).length;
      const tokens = ITEMS.reduce((sum, item) => sum + (Number(item.tokens) || 0), 0);
      document.getElementById("conversation-count").textContent = compactFormat.format(ITEMS.length);
      document.getElementById("project-count").textContent = compactFormat.format(PROJECTS.size);
      document.getElementById("subagent-count").textContent = compactFormat.format(subagents);
      document.getElementById("token-count").textContent = compactFormat.format(tokens);
    }

    function matches(item, term) {
      if (!term) return true;
      const terms = term.toLowerCase().split(/\s+/).filter(Boolean);
      return terms.every((needle) => item._search.includes(needle));
    }

    function baseItems() {
      if (mode === "recent") return ITEMS.filter((item) => !item.sa);
      return ITEMS;
    }

    function currentItems() {
      const term = query.value.trim();
      const items = baseItems();
      return term ? items.filter((item) => matches(item, term)) : items;
    }

    function setMode(nextMode, shouldRender = true) {
      mode = nextMode;
      writeStore(STORE_MODE, mode);
      for (const button of modeButtons) {
        const active = button.dataset.mode === mode;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
      }
      tabHelp.textContent = {
        projects: "Grouped by project. Parent conversations and sub-agent runs stay in the same project context.",
        recent: "Newest parent conversations only. Sub-agent runs are hidden here to keep the main thread list clean.",
      }[mode];
      if (shouldRender) renderList();
    }

    function setActiveRow() {
      list.querySelectorAll("[data-file]").forEach((row) => {
        const active = row.dataset.file === activeFile;
        row.classList.toggle("is-active", active);
        if (active) row.setAttribute("aria-current", "page");
        else row.removeAttribute("aria-current");
      });
    }

    function openConversation(item) {
      if (!item) return;
      activeFile = item.f;
      setActiveRow();
      viewer.classList.add("is-loading");
      viewerStatusTitle.textContent = "Loading conversation";
      viewerStatusCopy.textContent = item.t;
      viewerTitle.textContent = item.t;
      viewerMeta.textContent = `${item.p} / ${numberFormat.format(item.prompts || 0)} prompts / ${numberFormat.format(item.tools || 0)} tools`;
      setDownloadLink(viewerMd, item.md);
      setDownloadLink(viewerJson, item.json);
      if (frame.getAttribute("src") !== item.f) {
        frame.src = item.f;
      } else {
        viewer.classList.remove("is-loading");
      }
    }

    function makePill(text, variant = "") {
      const pill = document.createElement("span");
      pill.className = variant ? `pill ${variant}` : "pill";
      pill.textContent = text;
      return pill;
    }

    function makeConversationRow(item) {
      const row = document.createElement("a");
      row.className = "conversation-row";
      row.href = item.f;
      row.target = "view";
      row.dataset.file = item.f;
      row.addEventListener("click", (event) => {
        event.preventDefault();
        openConversation(item);
      });

      const top = document.createElement("div");
      top.className = "row-top";
      const name = document.createElement("div");
      name.className = "row-name";
      name.textContent = item.t;
      top.append(name);

      const project = document.createElement("div");
      project.className = "row-project";
      project.textContent = item.pb || item.p || "Unknown";
      project.title = item.p || project.textContent;

      const copy = document.createElement("div");
      copy.className = "row-copy";
      copy.textContent = item.preview || itemDetail(item);

      const pills = document.createElement("div");
      pills.className = "pill-row";
      const when = formatDateTime(item.last || item.dt);
      if (when) pills.append(makePill(when, "time"));
      pills.append(makePill(`${numberFormat.format(item.prompts || 0)} prompts`, "accent"));
      if (item.tools) pills.append(makePill(`${numberFormat.format(item.tools)} tools`, "tools"));
      if (item.sa) pills.append(makePill("sub-agent", "agent"));

      row.append(top, project, copy, pills);
      return row;
    }

    function makeHint(title, copy) {
      const hint = document.createElement("div");
      hint.className = "hint";
      const strong = document.createElement("strong");
      strong.textContent = title;
      const span = document.createElement("span");
      span.textContent = copy;
      hint.append(strong, span);
      return hint;
    }

    function groupedByProject(items) {
      const grouped = new Map();
      for (const item of items) {
        if (!grouped.has(item.p)) grouped.set(item.p, []);
        grouped.get(item.p).push(item);
      }
      return Array.from(grouped.entries()).sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
    }

    function renderProjects(items, fragment) {
      let rendered = 0;
      for (const [project, projectItems] of groupedByProject(items)) {
        const forceOpen = Boolean(query.value.trim());
        const collapsed = !forceOpen && collapsedProjects.has(project);
        const group = document.createElement("section");
        group.className = "project-group";
        group.classList.toggle("is-collapsed", collapsed);
        const header = document.createElement("button");
        header.type = "button";
        header.className = "project-heading";
        header.dataset.project = project;
        header.setAttribute("aria-expanded", collapsed ? "false" : "true");
        header.addEventListener("click", () => {
          if (collapsedProjects.has(project)) collapsedProjects.delete(project);
          else collapsedProjects.add(project);
          writeSet(STORE_PROJECTS, collapsedProjects);
          renderList();
        });
        const main = document.createElement("span");
        main.className = "project-main";
        const caret = document.createElement("span");
        caret.className = "project-caret";
        caret.textContent = collapsed ? "+" : "-";
        const name = document.createElement("strong");
        name.textContent = project;
        main.append(caret, name);
        const meta = document.createElement("span");
        meta.className = "project-meta";
        const agents = projectItems.filter((item) => item.sa).length;
        const parents = projectItems.length - agents;
        meta.textContent = `${numberFormat.format(parents)} conversations / ${numberFormat.format(agents)} agents`;
        header.append(main, meta);
        group.appendChild(header);

        const children = document.createElement("div");
        children.className = "project-children";
        children.hidden = collapsed;
        if (!collapsed) {
          for (const item of projectItems) {
            if (rendered >= MAX_ROWS) break;
            children.appendChild(makeConversationRow(item));
            rendered += 1;
          }
        }
        group.appendChild(children);
        fragment.appendChild(group);
        if (rendered >= MAX_ROWS) break;
      }
      return rendered;
    }

    function renderFlat(items, fragment) {
      const rows = items.slice(0, MAX_ROWS);
      for (const item of rows) fragment.appendChild(makeConversationRow(item));
      return rows.length;
    }

    function renderList() {
      renderTimer = 0;
      const items = currentItems();
      const fragment = document.createDocumentFragment();
      let rendered = 0;

      if (!items.length) {
        fragment.appendChild(makeHint("No matches", "Try a project path, prompt phrase, tool name, or model."));
      } else if (mode === "projects") {
        rendered = renderProjects(items, fragment);
      } else {
        rendered = renderFlat(items, fragment);
      }

      if (items.length > MAX_ROWS) {
        fragment.appendChild(makeHint("Result cap reached", `Showing ${MAX_ROWS} of ${numberFormat.format(items.length)} matches. Narrow the search for more precise results.`));
      }

      list.replaceChildren(fragment);
      setActiveRow();
    }

    function scheduleRender() {
      if (renderTimer) window.clearTimeout(renderTimer);
      renderTimer = window.setTimeout(renderList, 70);
    }

    frame.addEventListener("load", () => {
      viewer.classList.remove("is-loading");
    });

    async function downloadLinkedFile(link) {
      const href = link.getAttribute("href");
      if (!href || href === "#") return;
      const name = link.dataset.downloadName || link.getAttribute("download") || fileName(href);
      if (window.location.protocol !== "file:") {
        try {
          const response = await fetch(href);
          if (!response.ok) throw new Error("Download failed");
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = name;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(url);
          return;
        } catch {
          // Fall back to a normal same-origin anchor below.
        }
      }
      const anchor = document.createElement("a");
      anchor.href = href;
      anchor.download = name;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    document.querySelectorAll("[data-download]").forEach((link) => {
      if (window.location.protocol === "file:") {
        link.title = "Browsers may open local file:// links instead of downloading. Use claude-history serve for reliable one-click downloads.";
      }
      link.addEventListener("click", (event) => {
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
        if (!link.getAttribute("href") || link.getAttribute("href") === "#") {
          event.preventDefault();
          return;
        }
        event.preventDefault();
        downloadLinkedFile(link);
      });
    });

    query.addEventListener("input", scheduleRender);

    for (const button of modeButtons) {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    }

    document.addEventListener("keydown", (event) => {
      const wantsSearch = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k";
      if (wantsSearch) {
        event.preventDefault();
        query.focus();
        query.select();
      }
      if (event.key === "Escape" && document.activeElement === query && query.value) {
        query.value = "";
        renderList();
      }
    });

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "claude-history-open") return;
      const item = BY_FILE.get(event.data.file);
      if (!item) return;
      query.value = "";
      if (item.sa) {
        collapsedProjects.delete(item.p);
        writeSet(STORE_PROJECTS, collapsedProjects);
        setMode("projects", false);
      }
      renderList();
      openConversation(item);
    });

    updateSummary();
    setMode(mode, false);
    renderList();
    openConversation(ITEMS.find((item) => !item.sa) || ITEMS[0]);
  </script>
</body>
</html>
