<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__TITLE__</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script>
    try {
      if (window.self !== window.top) document.documentElement.classList.add("in-frame");
    } catch {
      document.documentElement.classList.add("in-frame");
    }
  </script>
</head>
<body class="conversation-page">
  <a class="skip-link" href="#conversation">Skip to conversation</a>
  <main class="conversation-shell" id="conversation">
    <a class="back-link" href="../index.html" target="_top">Back to index</a>
    __BODY__
  </main>
  <script>
    document.querySelectorAll(".resume-copy").forEach(function (b) {
      b.addEventListener("click", function () {
        var text = b.getAttribute("data-cmd") || "";
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function () {
            b.textContent = "Copied";
            setTimeout(function () { b.textContent = "Copy"; }, 1500);
          }, function () {});
        }
      });
    });
  </script>
</body>
</html>
